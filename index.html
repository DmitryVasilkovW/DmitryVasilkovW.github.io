<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Калькулятор системы отсчета</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #343a40;
            padding: 20px;
            color: #f8f9fa;
        }
        .input-field {
            margin: 20px 0;
            background-color: #fff;
            border-radius: 5px;
            padding: 20px;
            box-shadow: 0px 0px 10px 0px rgba(0,0,0,0.1);
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 1.2em;
            color: #adb5bd;
        }
        input[type="number"] {
            width: 100%;
            padding: 15px;
            box-sizing: border-box;
            border-radius: 5px;
            border: 2px solid #ccc;
            font-size: 1.1em;
            color: #343a40;
            background-color: #f8f9fa;
        }
        button {
            display: block;
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            color: white;
            background-color: #007bff;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0px 0px 10px 0px rgba(0,0,0,0.1);
            font-size: 1.2em;
        }
        button:hover {
            background-color: #0056b3;
        }
        h1, h2 {
            text-align: center;
            font-size: 2em;
            color: #f8f9fa;
        }
    </style>
</head>
<body>
<h1>Калькулятор системы отсчета</h1>
<div class="input-field">
    <label for="V">Скорость системы отсчета V:</label>
    <input type="number" id="V" placeholder="Введите скорость системы отсчета" style="color: #343a40;">
</div>
<div class="input-field">
    <label for="v_prime">Скорость материальной точки v':</label>
    <input type="number" id="v_prime" placeholder="Введите скорость материальной точки в системе отсчета" style="color: #343a40;">
</div>
<div class="input-field">
    <label for="x_prime">Начальная координата материальной точки x_0':</label>
    <input type="number" id="x_prime" placeholder="Введите начальную координату материальной точки в системе отсчета" style="color: #343a40;">
</div>
<button onclick="calculate()">Рассчитать v и x</button>
<div class="input-field">
    <label for="v">Скорость материальной точки v:</label>
    <input type="number" id="v" placeholder="Введите скорость материальной точки" style="color: #343a40;">
</div>
<div class="input-field">
    <label for="x">Координата материальной точки x:</label>
    <input type="number" id="x" placeholder="Введите координату материальной точки" style="color: #343a40;">
</div>
<button onclick="calculatePrime()">Рассчитать v' и x'</button>
<h2 id="output"></h2>

<script>
    function calculate() {
        const V = parseFloat(document.getElementById('V').value);
        const v_prime = parseFloat(document.getElementById('v_prime').value);
        const x_prime = parseFloat(document.getElementById('x_prime').value);

        const v = Math.round(((V + v_prime) / (1 + V * v_prime)) * 10) / 10;
        const x = Math.round((V * x_prime / (1 + V * v_prime)) * 100) / 100;

        document.getElementById('output').innerHTML = 'Скорость v: ' + v + ', Координата x: ' + x;
    }

    function calculatePrime() {
        const V = parseFloat(document.getElementById('V').value);
        const v = parseFloat(document.getElementById('v').value);
        const x = parseFloat(document.getElementById('x').value);

        const v_prime = Math.round((v + V * (v ** 2) - V) * 100) / 100;
        const x_prime = Math.round(((x * (1 + V * v_prime)) / V) * 100) / 100;

        document.getElementById('output').innerHTML = "Скорость v': " + v_prime + ", Координата x_0': " + x_prime;
    }
</script>

</body>
</html>
